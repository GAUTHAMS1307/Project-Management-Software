services:
  - type: web
    name: project-management-api
    runtime: node
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: VERIFIED_SENDER_EMAIL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
